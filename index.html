    <title>hgraph examples</title>
    <script>window.__HGRAPH_DATA__={"title": "hgraph examples", "subtitle": "A plain-files semantic graph for autoformalization — two small worked examples", "brand": "hgraph", "overviewHtml": "<h3>Two examples</h3>\n<p>These two examples are minimal, it is just to show how to use <code>hgraph</code> to build a site from Lean sources.</p>\n<p>Both projects below are built the same way: a <code>leanblueprint</code>-style <code>.tex</code> + Lean sources, parsed by <code>hgraph sync</code> into a plain-files graph. This whole site — this landing page and each project&#x27;s statements — is <code>hgraph site</code>.</p>\n<ul>\n<li><b>Sync workflow</b> shows the end-to-end pipeline: sync, layer on provenance/comments/reviews by hand, re-sync (idempotent).</li>\n<li><b>Schema reference</b> exercises the rest of the schema — every <code>content_type</code>, a wide <code>origin</code> spread, a stale-node demo, and the Maths/Lean review shape.</li>\n</ul>\n<p>See the <a href=\"https://github.com/AxelDlv00/hgraph\">source, docs, and CLI</a>.</p>", "tabs": [{"id": "people", "label": "People", "html": "<h3>People</h3>\n<p>These worked examples are maintained as part of <b>hgraph</b>. This tab is itself a demonstration: it is a plain Markdown file wired in through the workspace <code>config.yaml</code>&#x27;s <code>tabs:</code> list — no code change required.</p>\n<h4>Maintainers</h4>\n<ul>\n<li><b>Axel Delaval</b> — author of hgraph and these examples.</li>\n</ul>\n<h4>Contributing</h4>\n<p>hgraph is a plain-files graph: every node and edge is a Markdown file with YAML metadata, so contributing a statement, a review, or a comment is an ordinary Git change. See the project <a href=\"https://github.com/AxelDlv00/hgraph\">README</a> to get started.</p>\n<p><i>Add your own tabs — People, Roadmap, Acknowledgements — by dropping a <code>.md</code> or <code>.html</code> file next to this one and listing it under <code>tabs:</code>.</i></p>"}], "footer": null, "sections": [{"category
