# hgraph schema — the single source of truth for what a node / edge may contain.
#
# NOTATION
#   a | b | c    an ENUM: only these values are allowed (validator errors otherwise).
#                To propose a new value, add it here.
#   <text>       free text.        <hash> auto-generated id.        <int>/<num>/<url> typed.
#   # required / # optional        whether the field must be present.
#
# OWNERSHIP.  A field is either [derived] by `sync` from the blueprint / Lean
# sources, or [authored] by a human / agent. `sync` overwrites only what it owns
# and never touches authored fields, so re-syncing is idempotent.
#
# This file is meant to DRIVE validation once you approve it: the enums below
# become the allow-lists, and the `rules` section fixes error-vs-warning behaviour.
# Nothing is enforced yet — this is the proposal for your feedback.

# ─────────────────────────────────────────────────────────────────────────────
# NODE   →   hgraph/nodes/<id>.md   (this YAML is the file's header; body = content)
#            hgraph/nodes/<id>/     sibling dir, created only if the node has attachments
# ─────────────────────────────────────────────────────────────────────────────
node:
  id:            <hash>          # sha1("<kind>:<key>")[:12]; never typed by hand.
                                 # Address by label:/decl:/key: — the CLI resolves it.
  label:         <text>          # [derived] blueprint node: the LaTeX \label  (the id key)
  decl:          <text>          # [derived] lean node: fully-qualified name    (the id key)
  key:           <text>          # [authored] hand-added node: the human key    (the id key)
  generated:     blueprint | lean   # [derived] present iff sync owns this node's derived fields
  title:         <text>          # required

  # ── provenance (auto) ──
  author:        <text>          # who made it: `sync`, a person's name, a tool, … (synced ⇒ `sync`)
  created:       <text>          # ISO timestamp, stamped on creation
  updated:       <text>          # ISO timestamp, bumped only when the node actually changes

  type:          tex | lean | md

  content_type:  statement | definition | theorem | lemma | proposition | corollary
                 | proof | example | remark | conjecture | quote | instance   # [derived when synced]
  status:        false | failed | draft | verified | built   # [authored] the agent's workflow state
  lean_status:   lean_ok | mathlib_ok | sorry | empty        # [derived] on EVERY node:
                 #   lean node — from the source (`sorry` in body → sorry, else lean_ok).
                 #   tex  node — aggregated from the Lean node(s) it formalizes; \mathlibok
                 #               → mathlib_ok; any sorry → sorry; no \lean → empty.
  mathlib_name:  [<text>, ...]   # [derived] the Mathlib declaration name(s) when lean_status = mathlib_ok
  stale:         true            # [derived] the source \label/decl vanished; kept, never auto-deleted
  origin:        book | article | preprint | textbook | lecture-notes | repository | ai | human | unknown
  origin_details:                # [authored] structured provenance (preferred over a flat string)
    work:        <text>
    author:      <text>
    edition:     <text>
    version:     <text>
    chapter:     <text>
    section:     <text>
    page:        <int>
    year:        <int>
    url:         <url>

  lang:          en | fr | de | other   # [authored]
  tags:          [<text>, ...]   # [authored] optional — free-form labels
  docstring:     <text>          # [derived, lean] the declaration's /-- … -/ doc comment
  file:          <path>          # [derived, lean] the source file, e.g. Gauss/Basic.lean

  # ── body (below the --- fence) ──
  # [derived when synced] a blueprint statement, or a Lean declaration's source.
  # For a hand-added node, whatever you write (a source quote, a note, …).

# ─────────────────────────────────────────────────────────────────────────────
# ATTACHMENTS   →   hgraph/nodes/<id>/<kind>-N.md    (NOT nodes, NOT edges)
#   kind: comment | review
# A comment ("tried simp, failed because …") or a review is a small file under
# its owner node's sibling directory — notes that travel with the node.
# [authored] — sync never touches them. Header fields:
#   author:      <text>          # who wrote it
#   date:        <text>          # ISO timestamp, stamped on creation
#   title:       <text>          # optional — short heading
#   confidence:  <num> | <text>  # optional — the reviewer's confidence (0.8, high, low)
#   verdict:     good | bad      # optional (review) — is the reviewed node good or not
#   quality:     <num> | <text>  # optional (review) — a quality rating/note (high, 0.8, …)
#   (any other --set k=v is kept too)     body (below the fence) = the note.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# EDGE   →   hgraph/edges/<source>__<target>.md   (ONE file per ordered pair;
#            the type lives in the metadata, NOT in the filename)
# ─────────────────────────────────────────────────────────────────────────────
edge:
  source:        <id>            # required — must be an existing node (ERROR otherwise)
  target:        <id>            # required — must be an existing node (ERROR otherwise)
  type:          depends_on | uses | formalizes | informal_of | quote | related_to
                 #   hard (dependency): depends_on (statement \uses) | uses (proof \uses) | imports
                 #   identity (merges in union view): formalizes (\lean) | informal_of | same_as
                 #   associative (distinct): quote | related_to | …
                 # (comments & reviews are ATTACHMENTS, not edges — see above)
  hard:          true | false    # auto-filled from the type's class
  generated:     blueprint       # [derived] present iff sync created it; authored edges omit it
  note:          <text>          # [authored] optional — short justification