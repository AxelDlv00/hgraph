# Tells `hgraph sync` (run with no flags) where this project's sources live.
# Paths are relative to the project root (the dir that contains hgraph/).
blueprint: blueprint/blueprint.tex
lean: [Lean]

# Tells a bare `hgraph site` (no --manifest) how to build this solo project's
# index.html landing page — see hgraph.site's docstring.
site:
  title: Gauss summation
  subtitle: A small worked example of hgraph sync (blueprint + Lean → graph)
  overview: overview.md
  repo: AxelDlv00/hgraph
